<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fontmask settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="options">
    <main class="card wide">
      <header>
        <h1>Fontmask advanced</h1>
        <p class="muted">
          Tune noise vs performance. Values clamp automatically to safe ranges.
        </p>
      </header>
      <section>
        <h2>Metrics</h2>
        <label>
          measureText max offset (px)
          <input type="number" step="0.001" id="measureTextMaxOffsetPx" />
        </label>
        <label>
          quantize step (px)
          <input type="number" step="0.001" id="metricsQuantizeStepPx" />
        </label>
      </section>
      <section>
        <h2>Font surface</h2>
        <label>
          phantom families
          <input type="number" id="phantomFontCount" />
        </label>
        <label>
          fonts.check flip probability
          <input type="number" step="0.01" id="fontCheckFlipProbability" />
        </label>
      </section>
      <section>
        <h2>Work budget</h2>
        <label>
          max fonts.check calls
          <input type="number" id="maxFontsChecksPerInvocation" />
        </label>
      </section>
      <section>
        <h2>API hooks</h2>
        <label class="inline-check">
          <input type="checkbox" id="hookCanvasMeasureText" checked />
          Canvas measureText / TextMetrics
        </label>
        <label class="inline-check">
          <input type="checkbox" id="hookDocumentFontsCheck" checked />
          document.fonts.check
        </label>
        <label class="inline-check">
          <input type="checkbox" id="hookOffsetDimensions" checked />
          DOM layout (boxes, offsets, client/scroll sizes)
        </label>
      </section>
      <footer class="actions">
        <button id="save" type="button">Save</button>
        <button id="export" type="button" class="secondary">Export JSON</button>
        <input type="file" id="import" accept="application/json" hidden />
        <button id="importBtn" type="button" class="secondary">Import JSON</button>
      </footer>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
